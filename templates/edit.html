<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Pengeluaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h1 class="mb-4">
            Edit Pengeluaran
        </h1>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">
                    Nama Pengeluaran
                </label>
                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ expense.title }}"
                    required
                >
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Jumlah Pengeluaran
                </label>
                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    class="form-control"
                    value="{{ expense.amount }}"
                    required
                >
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Tanggal Pengeluaran
                </label>
                <input
                    type="date"
                    name="created_at"
                    class="form-control"
                    value="{{ expense.created_at }}"
                    required
                >
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Kategori
                </label>
                <select name="category"
                        class="form-select"
                        required>
                    <option value="Kebutuhan"
                    {% if expense.category == 'Kebutuhan' %}
                    selected
                    {% endif %}
                    >
                        Kebutuhan
                    </option>
                    <option value="Keinginan"
                    {% if expense.category == 'Keinginan' %}
                    selected
                    {% endif %}
                    >
                        Keinginan
                    </option>
                    <option value="Tabungan/Investasi"
                    {% if expense.category == 'Tabungan/Investasi' %}
                    selected
                    {% endif %}
                    >
                        Tabungan/Investasi
                    </option>
                    <option value="Cicilan"
                    {% if expense.category == 'Cicilan' %}
                    selected
                    {% endif %}
                    >
                        Cicilan
                    </option>
                </select>
            </div>
            <button type="submit"
                    class="btn btn-primary">
                Simpan Perubahan
            </button>
            <a href="/expenses"
               class="btn btn-secondary">
                Kembali
            </a>
        </form>
    </div>
</div>
</body>
</html>
