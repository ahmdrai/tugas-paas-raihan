<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Pencatatan Pengeluaran Harian</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h1 class="mb-4 text-center">Pencatatan Pengeluaran Harian</h1>

        <form action="/expenses/add" method="POST">

            <div class="mb-3">
                <label class="form-label">Nama Pengeluaran</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Jumlah Pengeluaran</label>
                <input type="number" step="0.01" name="amount" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Kategori</label>
                <select name="category" class="form-select" required>
                    <option value="">-- Select Category --</option>
                    <option value="Kebutuhan">
                        Kebutuhan
                    </option>
                    <option value="Keinginan">
                        Keinginan
                    </option>
                    <option value="Tabungan/Investasi">
                        Tabungan/Investasi
                    </option>
                    <option value="Cicilan">
                        Cicilan
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Tambah Pengeluaran
            </button>

        </form>

        <a href="/expenses" class="btn btn-success mt-3">
            Lihat Daftar Pengeluaran
        </a>

    </div>

</div>

</body>
</html>
