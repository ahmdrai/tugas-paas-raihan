<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Judul halaman -->
    <title>Aplikasi Pencatatan Pengeluaran Harian</title>

    <!-- Import Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<!-- Container utama aplikasi -->
<div class="container mt-5">
    <div class="card shadow p-4">
        <!-- Judul aplikasi -->
        <h1 class="mb-4 text-center">
            Pencatatan Pengeluaran Harian
        </h1>
        <!-- Form tambah pengeluaran -->
        <form action="/expenses/add" method="POST">

            <!-- Input nama pengeluaran -->
            <div class="mb-3">
                <label class="form-label">
                    Nama Pengeluaran
                </label>
                <input type="text"
                       name="title"
                       class="form-control"
                       required>
            </div>

            <!-- Input jumlah pengeluaran -->
            <div class="mb-3">
                <label class="form-label">
                    Jumlah Pengeluaran
                </label>
                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control"
                       required>
            </div>

            <!-- Input tanggal pengeluaran -->
            <div class="mb-3">
                <label class="form-label">
                    Tanggal Pengeluaran
                </label>
                <input type="date"
                       name="created_at"
                       class="form-control"
                       required>
            </div>

            <!-- Pilihan kategori pengeluaran -->
            <div class="mb-3">
                <label class="form-label">
                    Kategori
                </label>
                <select name="category"
                        class="form-select"
                        required>
                    <option value="">
                        -- Select Category --
                    </option>
                    <option value="Kebutuhan">
                        Kebutuhan
                    </option>
                    <option value="Keinginan">
                        Keinginan
                    </option>
                    <option value="Tabungan/Investasi">
                        Tabungan/Investasi
                    </option>
                    <option value="Cicilan">
                        Cicilan
                    </option>
                </select>
            </div>

            <!-- Tombol tambah pengeluaran -->
            <button type="submit"
                    class="btn btn-primary w-100">
                Tambah Pengeluaran
            </button>

        </form>

        <!-- Tombol daftar pengeluaran -->
        <a href="/expenses"
           class="btn btn-success mt-3">
            Lihat Daftar Pengeluaran
        </a>

    </div>
</div>
</body>
</html>
