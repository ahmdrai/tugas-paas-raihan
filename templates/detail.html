<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Judul halaman -->
    <title>Detail Pengeluaran</title>

    <!-- Import Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">
<!-- Container utama -->
<div class="container mt-5">
    <div class="card shadow p-4">
        <!-- Judul halaman -->
        <h1 class="mb-4">
            Detail Pengeluaran
        </h1>

        <!-- Menampilkan nama pengeluaran -->
        <p>
            <strong>Nama Pengeluaran:</strong>
            {{ expense.title }}
        </p>

        <!-- Menampilkan jumlah pengeluaran -->
        <p>
            <strong>Jumlah:</strong>
            Rp {{ expense.amount }}
        </p>

        <!-- Menampilkan kategori pengeluaran -->
        <p>
            <strong>Kategori:</strong>
            {{ expense.category }}
        </p>

        <!-- Menampilkan tanggal pengeluaran -->
        <p>
            <strong>Tanggal:</strong>
            {{ expense.created_at.strftime('%d-%m-%Y') }}
        </p>

        <!-- Tombol kembali ke halaman daftar pengeluaran -->
        <a href="/expenses"
           class="btn btn-secondary">
            Kembali
        </a>
    </div>
</div>

</body>
</html>
